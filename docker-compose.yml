services:

  postgres:
    image: postgres
    container_name: postgres-data-engineer
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: production_db
    ports:
      - "5432:5432"

  data-pipeline:
    build: .
    container_name: data-pipeline
    depends_on:
      - postgres
    command: sh -c "sleep 10 && python src/main.py"

  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    command: airflow standalone

  metabase:
    image: metabase/metabase
    container_name: metabase
    depends_on:
      - postgres
    ports:
      - "3000:3000"